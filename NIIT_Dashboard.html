<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIIT Liability Dashboard | Bipartisan Policy Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faustina:wght@400;600&family=Roboto+Slab:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
/* ── BPC Design Tokens ───────────────────────────────────────────────────── */
:root {
  --bpc-red:        #e43e47;
  --bpc-blue:       #3c608a;
  --bpc-dark-gray:  #333638;
  --bpc-light-gray: #d3d8d6;
  --bpc-bg:         #f4f5f5;
  --bpc-cornflower: #1b83c6;
  --bpc-strong-red: #b91f24;
  --bpc-dark-blue:  #1f476c;
  --bpc-orange:     #f47521;
  --bpc-green:      #00ad4d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Faustina', Georgia, serif; background: var(--bpc-bg); color: var(--bpc-dark-gray); }

/* Header */
.header {
  background: var(--bpc-blue);
  border-top: 5px solid var(--bpc-red);
  color: white;
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 {
  font-family: 'Roboto Slab', Georgia, serif;
  font-weight: 700;
  font-size: 1.3rem;
  letter-spacing: 0.01em;
}
.header p { font-size: 0.78rem; opacity: 0.8; margin-top: 4px; }
.bpc-logo {
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: white; opacity: 0.9; white-space: nowrap;
}

/* Controls */
.controls {
  background: white;
  border-bottom: 1px solid var(--bpc-light-gray);
  padding: 11px 32px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.tabs { display: flex; gap: 0; border: 1.5px solid var(--bpc-blue); border-radius: 4px; overflow: hidden; }
.tab-btn {
  padding: 6px 20px;
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 0.82rem; font-weight: 500;
  cursor: pointer; border: none;
  background: white; color: var(--bpc-blue);
  transition: all 0.15s;
}
.tab-btn.active { background: var(--bpc-blue); color: white; }
.tab-btn:hover:not(.active) { background: #eaf0f7; }

label.metric-label {
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 0.8rem; font-weight: 500; color: var(--bpc-dark-gray);
}
select#metricSelect {
  padding: 6px 11px; font-family: 'Faustina', Georgia, serif;
  font-size: 0.83rem; border: 1.5px solid var(--bpc-light-gray);
  border-radius: 4px; cursor: pointer; background: white; color: var(--bpc-dark-gray);
}
select#metricSelect:focus { outline: none; border-color: var(--bpc-blue); }

.spacer { flex: 1; }
.note { font-size: 0.74rem; color: #888; font-style: italic; }

/* Map */
.map-wrap {
  background: white;
  margin: 16px 24px 0;
  border-radius: 6px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.07);
  border-top: 3px solid var(--bpc-red);
  padding: 16px 16px 8px;
  position: relative;
}
.zoom-controls {
  position: absolute; top: 14px; right: 14px;
  display: flex; flex-direction: column; gap: 4px; z-index: 10;
}
.zoom-btn {
  width: 30px; height: 30px;
  background: white; border: 1.5px solid var(--bpc-light-gray);
  border-radius: 4px; cursor: pointer;
  color: var(--bpc-blue); font-weight: 700; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1); transition: all 0.15s;
}
.zoom-btn:hover { background: #eaf0f7; border-color: var(--bpc-blue); }
.zoom-btn.reset {
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.03em;
}
#map { width: 100%; }
svg path.county { stroke: #ccc; stroke-width: 0.3; cursor: pointer; transition: opacity 0.1s; }
svg path.county:hover { stroke: var(--bpc-dark-gray); stroke-width: 1.2; opacity: 0.85; }
svg path.state-border { fill: none; stroke: #555; stroke-width: 1.0; pointer-events: none; }
svg path.nation-border { fill: none; stroke: var(--bpc-dark-gray); stroke-width: 1.2; pointer-events: none; }
svg path.state-fill { cursor: pointer; stroke: #aaa; stroke-width: 0.7; transition: opacity 0.1s; }
svg path.state-fill:hover { stroke: var(--bpc-dark-gray); stroke-width: 1.8; opacity: 0.85; }

/* Tooltip */
#tooltip {
  position: fixed;
  background: rgba(51,54,56,0.96);
  color: white;
  padding: 10px 14px;
  border-radius: 4px;
  border-left: 3px solid var(--bpc-red);
  font-family: 'Faustina', Georgia, serif;
  font-size: 0.8rem; pointer-events: none; display: none;
  z-index: 999; max-width: 240px; line-height: 1.65;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}
#tooltip .tt-title {
  font-family: 'Roboto Slab', Georgia, serif;
  font-weight: 700; font-size: 0.87rem;
  margin-bottom: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.18);
  padding-bottom: 4px;
}
#tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
#tooltip .tt-val { font-weight: 600; color: #7ab0e0; }

/* Legend */
.legend-wrap { padding: 10px 16px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.legend-title {
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 0.76rem; font-weight: 500; color: var(--bpc-dark-gray);
}
#legend-svg { height: 22px; }
.legend-labels { display: flex; justify-content: space-between; font-size: 0.71rem; color: #666; }
.legend-scale-wrap { flex: 1; max-width: 340px; }
.legend-na { display: flex; align-items: center; gap: 5px; font-size: 0.74rem; color: #888; margin-left: 16px; }
.legend-na-box { width: 14px; height: 14px; background: #d3d8d6; border-radius: 2px; }

/* Table */
.table-section {
  margin: 14px 24px 32px;
  background: white;
  border-radius: 6px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.07);
  border-top: 3px solid var(--bpc-blue);
  padding: 18px 20px;
}
.table-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.table-controls h2 {
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 1rem; font-weight: 700; color: var(--bpc-blue);
}
.table-controls .spacer { flex: 1; }
input#searchBox {
  padding: 6px 11px; font-family: 'Faustina', Georgia, serif;
  font-size: 0.82rem; border: 1.5px solid var(--bpc-light-gray);
  border-radius: 4px; width: 200px;
}
input#searchBox:focus { outline: none; border-color: var(--bpc-blue); }
select#pageSizeSelect {
  padding: 6px 10px; font-family: 'Faustina', Georgia, serif;
  font-size: 0.82rem; border: 1.5px solid var(--bpc-light-gray); border-radius: 4px;
}
.row-count { font-size: 0.77rem; color: #888; }

table { width: 100%; border-collapse: collapse; font-size: 0.81rem; font-family: 'Faustina', Georgia, serif; }
thead th {
  background: #eaf0f7;
  color: var(--bpc-blue);
  font-family: 'Roboto Slab', Georgia, serif;
  font-weight: 500; padding: 9px 12px;
  text-align: left; cursor: pointer; user-select: none;
  white-space: nowrap; position: sticky; top: 0;
  border-bottom: 2px solid var(--bpc-blue);
}
thead th:hover { background: #dce8f3; }
thead th.sort-asc::after  { content: ' ▲'; font-size: 0.7em; }
thead th.sort-desc::after { content: ' ▼'; font-size: 0.7em; }
tbody tr { border-bottom: 1px solid var(--bpc-light-gray); }
tbody tr:hover { background: #f0f5fb; }
tbody tr.highlighted { background: #fff0d6; border-left: 3px solid var(--bpc-orange); }
td { padding: 8px 12px; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
td.hi { color: var(--bpc-strong-red); font-weight: 600; }
td.lo { color: var(--bpc-green); }

/* Pagination */
.pagination { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 0.81rem; color: #666; }
.pagination .spacer { flex: 1; }
.page-btn {
  padding: 5px 13px;
  border: 1.5px solid var(--bpc-light-gray);
  border-radius: 4px; cursor: pointer; background: white;
  font-family: 'Roboto Slab', Georgia, serif;
  font-size: 0.8rem; color: var(--bpc-blue); font-weight: 500;
}
.page-btn:hover:not(:disabled) { background: #eaf0f7; border-color: var(--bpc-blue); }
.page-btn:disabled { opacity: 0.35; cursor: default; }
.page-info { font-size: 0.79rem; color: #777; }

/* Table view toggle */
.tv-tabs { display: flex; gap: 0; border: 1.5px solid var(--bpc-blue); border-radius: 4px; overflow: hidden; }
.tv-btn { padding: 5px 14px; font-family: 'Roboto Slab', Georgia, serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; border: none; background: white; color: var(--bpc-blue); transition: all 0.15s; }
.tv-btn.active { background: var(--bpc-blue); color: white; }
.tv-btn:hover:not(.active) { background: #eaf0f7; }

/* Highlighted selected */
path.selected-county { stroke: var(--bpc-red) !important; stroke-width: 2 !important; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Net Investment Income Tax (NIIT) — County &amp; State Dashboard</h1>
    <p>Tax return data by geography &mdash; dollar figures in millions</p>
  </div>
  <div class="bpc-logo">Bipartisan Policy Center</div>
</div>

<div class="controls">
  <div class="tabs">
    <button class="tab-btn active" id="tabCounty" onclick="setTab('county')">County View</button>
    <button class="tab-btn" id="tabState" onclick="setTab('state')">State View</button>
  </div>
  <label class="metric-label" for="metricSelect">Color map by:</label>
  <select id="metricSelect" onchange="setMetric(this.value)">
    <option value="pct_returns_niit" selected>% Returns w/ NIIT</option>
    <option value="niit">$ Total NIIT (Millions of $)</option>
    <option value="avg_niit">$ Avg. NIIT per Filer</option>
    <option value="pct_niit_tax">% NIIT / Tax Liability</option>
    <option value="pct_niit_agi">% NIIT / AGI</option>
  </select>
  <div class="spacer"></div>
  <span class="note">Hover over map for details &bull; Click to highlight in table</span>
</div>

<div class="map-wrap">
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</button>
    <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">−</button>
    <button class="zoom-btn reset" onclick="zoomReset()" title="Reset zoom">RST</button>
  </div>
  <div id="map"></div>
  <div class="legend-wrap">
    <span class="legend-title" id="legendTitle">% Returns w/ NIIT</span>
    <div class="legend-scale-wrap">
      <svg id="legend-svg" width="300"></svg>
      <div class="legend-labels" id="legendLabels" style="width:300px"></div>
    </div>
    <div class="legend-na"><div class="legend-na-box"></div>No data</div>
  </div>
</div>

<div id="tooltip"></div>

<div class="table-section">
  <div class="table-controls">
    <h2 id="tableTitle">County Data</h2>
    <span class="row-count" id="rowCount"></span>
    <div class="spacer"></div>
    <label class="metric-label">Show:</label>
    <div class="tv-tabs">
      <button class="tv-btn active" id="tvCounty" onclick="setTableView('county')">Counties</button>
      <button class="tv-btn" id="tvState" onclick="setTableView('state')">States</button>
    </div>
    <input id="searchBox" type="text" placeholder="Search county or state…" oninput="onSearch()">
    <select id="pageSizeSelect" onchange="onPageSizeChange()">
      <option value="25" selected>25 per page</option>
      <option value="50">50 per page</option>
      <option value="100">100 per page</option>
    </select>
  </div>
  <div style="overflow-x:auto">
    <table id="dataTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">&#8249; Prev</button>
    <span class="page-info" id="pageInfo"></span>
    <div class="spacer"></div>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next &#8250;</button>
  </div>
</div>

// ─── Tooltip ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(e, d) {
  const m = METRICS[currentMetric];
  const isCounty = currentTab === 'county';
  const name = isCounty ? `${d.county}, ${d.state}` : `${d.state}`;
  const mFmt  = v => v!=null ? '$'+d3.format(',.2f')(v/1000)+'M' : 'N/A';
  const pctFmt = v => v!=null ? v.toFixed(1)+'%' : 'N/A';
  const numFmt = v => v!=null ? d3.format(',.0f')(v) : 'N/A';
  const dolFmt = v => v!=null ? '$'+d3.format(',.0f')(v) : 'N/A';
  tooltip.innerHTML = `
    <div class="tt-title">${name}</div>
    <div class="tt-row"><span>% Returns w/ NIIT</span><span class="tt-val">${pctFmt(d.pct_returns_niit)}</span></div>
    <div class="tt-row"><span>Total NIIT</span><span class="tt-val">${mFmt(d.niit)}</span></div>
    <div class="tt-row"><span>Avg. NIIT per Filer</span><span class="tt-val">${dolFmt(d.avg_niit)}</span></div>
    <div class="tt-row"><span>% NIIT / Tax Liab.</span><span class="tt-val">${pctFmt(d.pct_niit_tax)}</span></div>
    <div class="tt-row"><span>NIIT Filers</span><span class="tt-val">${numFmt(d.returns_niit)}</span></div>
  `;
  tooltip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const x = e.clientX + 14, y = e.clientY - 10;
  tooltip.style.left = Math.min(x, window.innerWidth - 240) + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ─── Color scale + Legend ─────────────────────────────────────────────────────
function buildColorScale(data, metric) {
  const vals = data.map(d => d[metric]).filter(v => v != null && isFinite(v));
  if (!vals.length) return () => '#ddd';
  const scheme = METRICS[metric].scheme;
  const scale = d3.scaleQuantile().domain(vals).range(scheme);
  return scale;
}

function updateLegend(scale, metric) {
  const m = METRICS[metric];
  document.getElementById('legendTitle').textContent = m.label;
  const legendSvg = d3.select('#legend-svg');
  legendSvg.selectAll('*').remove();
  if (!scale.quantiles) return;
  const q = scale.quantiles();
  const colors = m.scheme;
  const n = colors.length;
  const w = 300, sw = w / n;
  colors.forEach((c, i) => {
    legendSvg.append('rect').attr('x', i*sw).attr('y', 0).attr('width', sw).attr('height', 18).attr('fill', c);
  });
  // Labels: min, quantile breaks, max
  const allVals = scale.domain();
  const domainMin = d3.min(allVals), domainMax = d3.max(allVals);
  const breaks = [domainMin, ...q, domainMax];
  const labelDiv = document.getElementById('legendLabels');
  labelDiv.innerHTML = breaks.map(v => `<span>${m.fmt(v)}</span>`).join('');
}

// ─── Draw county map ──────────────────────────────────────────────────────────
function drawCountyMap() {
  g.selectAll('*').remove();
  colorScale = buildColorScale(RAW.counties, currentMetric);
  updateLegend(colorScale, currentMetric);

  const counties = topojson.feature(usTopoCounty, usTopoCounty.objects.counties);
  const states = topojson.mesh(usTopoCounty, usTopoCounty.objects.states, (a,b) => a!==b);
  const nation = topojson.mesh(usTopoCounty, usTopoCounty.objects.nation || usTopoCounty.objects.states, (a,b) => a===b);

  g.append('g').selectAll('path')
    .data(counties.features)
    .join('path')
    .attr('class', 'county')
    .attr('d', path)
    .attr('fill', d => {
      const rec = countyByFips[d.id];
      if (!rec) return '#d3d8d6';
      const v = rec[currentMetric];
      return v != null ? colorScale(v) : '#ddd';
    })
    .on('mouseover', (e, d) => {
      const rec = countyByFips[d.id];
      if (rec) showTooltip(e, rec);
    })
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', (e, d) => {
      const rec = countyByFips[d.id];
      if (rec) highlightInTable(d.id, rec);
    });

  g.append('path').datum(states).attr('class','state-border').attr('d', path);
}

// ─── Draw state map ───────────────────────────────────────────────────────────
function drawStateMap() {
  g.selectAll('*').remove();
  colorScale = buildColorScale(RAW.states, currentMetric);
  updateLegend(colorScale, currentMetric);

  const states = topojson.feature(usTopoState, usTopoState.objects.states);

  g.append('g').selectAll('path')
    .data(states.features)
    .join('path')
    .attr('class', 'state-fill')
    .attr('d', path)
    .attr('fill', d => {
      const fips = String(d.id).padStart(2,'0');
      const rec = stateByFips[fips];
      if (!rec) return '#d3d8d6';
      const v = rec[currentMetric];
      return v != null ? colorScale(v) : '#ddd';
    })
    .on('mouseover', (e, d) => {
      const fips = String(d.id).padStart(2,'0');
      const rec = stateByFips[fips];
      if (rec) showTooltip(e, rec);
    })
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', (e, d) => {
      const fips = String(d.id).padStart(2,'0');
      const rec = stateByFips[fips];
      if (rec) highlightInTable(rec.state, rec);
    });
}

// ─── Table rendering ──────────────────────────────────────────────────────────
function rebuildTable() {
  const isCounty = currentTableView==='county';
  const cols = isCounty ? COUNTY_COLS : STATE_COLS;
  tableData = isCounty ? [...RAW.counties] : [...RAW.states];
  sortCol = 'pct_returns_niit'; sortDir = 'desc';
  currentPage = 1;
  applyFilter();
  renderHead(cols);
  renderPage(cols);
}

function applyFilter() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const isCounty = currentTableView==='county';
  filteredData = tableData.filter(d => {
    if (!q) return true;
    if (isCounty) return d.county.toLowerCase().includes(q) || d.state.toLowerCase().includes(q);
    return d.state.toLowerCase().includes(q);
  });
  // Sort
  filteredData.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null) av = sortDir==='asc' ? Infinity : -Infinity;
    if (bv == null) bv = sortDir==='asc' ? Infinity : -Infinity;
    if (typeof av === 'string') return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir==='asc' ? av - bv : bv - av;
  });
  document.getElementById('rowCount').textContent = `${filteredData.length.toLocaleString()} row${filteredData.length!==1?'s':''}`;
  currentPage = 1;
}

function renderHead(cols) {
  const thead = document.getElementById('tableHead');
  const tr = document.createElement('tr');
  cols.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col.label;
    th.dataset.key = col.key;
    if (col.key===sortCol) th.className = 'sort-'+sortDir;
    th.addEventListener('click', () => {
      if (sortCol===col.key) sortDir = sortDir==='asc' ? 'desc' : 'asc';
      else { sortCol=col.key; sortDir='desc'; }
      applyFilter();
      renderHead(cols);
      renderPage(cols);
    });
    tr.appendChild(th);
  });
  thead.innerHTML = '';
  thead.appendChild(tr);
}

function renderPage(cols) {
  cols = cols || (currentTableView==='county' ? COUNTY_COLS : STATE_COLS);
  const ps = parseInt(document.getElementById('pageSizeSelect').value);
  const start = (currentPage-1)*ps, end = start+ps;
  const page = filteredData.slice(start, end);
  const totalPages = Math.max(1, Math.ceil(filteredData.length/ps));
  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage<=1;
  document.getElementById('nextBtn').disabled = currentPage>=totalPages;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  page.forEach(row => {
    const tr = document.createElement('tr');
    const rowFips = row.fips || row.state;
    if (rowFips===selectedFips) tr.classList.add('highlighted');
    tr.dataset.fips = rowFips;
    cols.forEach(col => {
      const td = document.createElement('td');
      td.className = col.cls;
      td.textContent = col.fmt(row[col.key]);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function highlightInTable(fips, rec) {
  selectedFips = fips;
  // Find page
  const idx = filteredData.findIndex(d => (d.fips||d.state)===fips);
  if (idx>=0) {
    const ps = parseInt(document.getElementById('pageSizeSelect').value);
    currentPage = Math.floor(idx/ps)+1;
  }
  renderPage();
  // Scroll to table
  document.querySelector('.table-section').scrollIntoView({behavior:'smooth', block:'start'});
}

function onSearch() {
  applyFilter();
  renderHead(currentTableView==='county' ? COUNTY_COLS : STATE_COLS);
  renderPage();
}
function onPageSizeChange() { currentPage=1; renderPage(); }
function changePage(dir) {
  const ps = parseInt(document.getElementById('pageSizeSelect').value);
  const totalPages = Math.max(1, Math.ceil(filteredData.length/ps));
  currentPage = Math.max(1, Math.min(totalPages, currentPage+dir));
  renderPage();
}

// ─── Load TopoJSON and init ───────────────────────────────────────────────────
Promise.all([
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-albers-10m.json').then(r=>r.json()),
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-albers-10m.json').then(r=>r.json()),
]).then(([countyTopo, stateTopo]) => {
  usTopoCounty = countyTopo;
  usTopoState = stateTopo;
  drawCountyMap();
  rebuildTable();
}).catch(err => {
  document.getElementById('map').innerHTML = '<p style="padding:20px;color:#c00">Map failed to load. Please check your internet connection.</p>';
  console.error(err);
});
</script>
